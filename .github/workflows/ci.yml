name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same branch/PR — saves runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      # Qt6 + OpenCL + LibRaw from apt; pocl is a CPU OpenCL ICD so the GPU
      # tests can actually run on a headless runner.
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build ccache \
            qt6-base-dev qt6-base-dev-tools libqt6opengl6-dev \
            libgl1-mesa-dev \
            opencl-headers opencl-clhpp-headers ocl-icd-opencl-dev \
            pocl-opencl-icd \
            libraw-dev

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ci-${{ runner.os }}

      - name: Configure
        run: cmake -B build -G Ninja

      - name: Build
        run: cmake --build build

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure -j$(nproc)
